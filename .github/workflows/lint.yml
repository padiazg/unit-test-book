name: lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: find . -name go.mod -execdir golangci-lint run ./... \;
