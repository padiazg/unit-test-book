site_name: Unit Testing in Go
site_description: 30 testing patterns from real Go projects — practical examples with code, tests, and explanations
site_url: https://padiazg.github.io/unit-test-book
repo_url: https://github.com/padiazg/unit-test-book
repo_name: padiazg/unit-test-book
edit_uri: edit/master/doc/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex:
      generic: true

nav:
  - Home: index.md
  - Foundations:
    - foundations/index.md
    - Classic Table-Driven: foundations/chapter-01-classic-table-driven.md
    - Value Assertions: foundations/chapter-02-value-assertions.md
    - Fields Struct Inputs: foundations/chapter-03-fields-struct-inputs.md
    - Subtest Naming: foundations/chapter-04-subtest-naming.md
  - Closure-Check:
    - closure-check/index.md
    - Typed Check Functions: closure-check/chapter-05-typed-check-functions.md
    - Check Collection Builder: closure-check/chapter-06-check-collection-builder.md
    - Check Factory Closures: closure-check/chapter-07-check-factory-closures.md
    - Error Message Verification: closure-check/chapter-08-error-message-verification.md
    - Output String Inspection: closure-check/chapter-09-output-string-inspection.md
    - Composable Check Navigation: closure-check/chapter-30-composable-check-navigation.md
    - Inline Check Closures: closure-check/chapter-31-inline-check-closures.md
  - Mocking:
    - mocking/index.md
    - Before Hook Pattern: mocking/chapter-10-before-hook-pattern.md
    - HTTP Client Interface Mock: mocking/chapter-11-http-client-interface-mock.md
    - RoundTripper Mock: mocking/chapter-12-roundtripper-mock.md
    - testify/mock Interfaces: mocking/chapter-13-testify-mock-interfaces.md
    - Function Variable Injection: mocking/chapter-14-function-variable-injection.md
    - Package-Level Var Swap: mocking/chapter-15-package-level-var-swap.md
    - Interface Extraction 3rd Party: mocking/chapter-32-interface-extraction-3rd-party.md
  - HTTP / I/O:
    - http-io/index.md
    - httptest.Server: http-io/chapter-16-httptest-server.md
    - httptest.ResponseRecorder: http-io/chapter-17-httptest-response-recorder.md
    - Error Readers: http-io/chapter-18-error-readers.md
    - Temp Files & Parsing: http-io/chapter-19-temp-files-and-parsing.md
  - Concurrency:
    - concurrency/index.md
    - Channel Delivery Tests: concurrency/chapter-20-channel-delivery-tests.md
    - Panic Recovery: concurrency/chapter-21-panic-recovery.md
    - Goroutine Run Loops: concurrency/chapter-22-goroutine-run-loops.md
  - Advanced Go:
    - advanced-go/index.md
    - Goroutine Leak Detection: advanced-go/chapter-23-goroutine-leak-detection.md
    - AST Parsing Complexity: advanced-go/chapter-24-ast-parsing-complexity.md
    - Benchmark Tests: advanced-go/chapter-25-benchmark-tests.md
    - Parallel Tests: advanced-go/chapter-26-parallel-tests.md
  - Integration:
    - integration/index.md
    - Service Layer Mocked Ports: integration/chapter-27-service-layer-mocked-ports.md
    - JSON Format Verification: integration/chapter-28-json-format-verification.md
    - Setup/Teardown Fixtures: integration/chapter-29-setup-teardown-fixtures.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/padiazg/unit-test-book
  analytics:
    provider: google
    property: !ENV ANALYTICS_ID

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
